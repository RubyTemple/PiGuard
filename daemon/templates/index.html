<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiGuard Enterprise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #020617; /* slate-950 */
            color: #e2e8f0; /* slate-200 */
        }
        .card {
            background-color: #0f172a; /* slate-900 */
            border: 1px solid rgba(30, 41, 59, 0.6); /* border-slate-800/60 */
        }
        .text-emerald-400 { color: #34d399; }
        .bg-emerald-500-10 { background-color: rgba(16, 185, 129, 0.1); }
        .text-amber-400 { color: #fbbf24; }
        .bg-amber-500-10 { background-color: rgba(245, 158, 11, 0.1); }
        .text-rose-500 { color: #f43f5e; }
        .bg-rose-500-10 { background-color: rgba(244, 63, 94, 0.1); }

        .badge-systemd { background-color: rgba(99, 102, 241, 0.2); color: #818cf8; } /* indigo */
        .badge-docker { background-color: rgba(139, 92, 246, 0.2); color: #a78bfa; } /* violet */

        /* Custom thin scrollbar for terminal */
        .terminal-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .terminal-scroll::-webkit-scrollbar-track {
            background: #0f172a;
        }
        .terminal-scroll::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }

        .table-row:hover {
            background-color: #1e293b; /* transition-all duration-300 */
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="p-6 font-sans">

    <div class="max-w-7xl mx-auto space-y-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center space-x-3">
                <i data-lucide="shield-check" class="text-emerald-400 w-8 h-8"></i>
                <h1 class="text-2xl font-bold tracking-wide">PiGuard<span class="text-slate-500 font-light">Hybrid</span></h1>

                <button onclick="toggleLang()" id="lang-btn" class="ml-4 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs py-1 px-2 rounded transition-colors duration-300 border border-slate-700">
                    🇬🇧 EN
                </button>
            </div>
            <div class="text-sm font-mono text-slate-400 flex items-center space-x-2">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span data-i18n="live_telemetry">LIVE SYSTEM TELEMETRY</span>
            </div>
        </div>

        <!-- Top Row: High-Fidelity Metric Cards -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
            <!-- CPU Load -->
            <div class="card rounded-lg p-5 flex flex-col justify-between h-32">
                <div class="flex justify-between items-start">
                    <span class="text-slate-400 text-sm font-medium uppercase tracking-wider" data-i18n="cpu_load">CPU Load</span>
                    <i data-lucide="cpu" class="text-slate-500 w-5 h-5"></i>
                </div>
                <div class="flex items-baseline space-x-2">
                    <span id="cpu-val" class="text-3xl font-mono font-bold text-emerald-400">0%</span>
                    <span id="cpu-temp" class="text-sm font-mono text-slate-500">0°C</span>
                </div>
            </div>

            <!-- Memory Pool -->
            <div class="card rounded-lg p-5 flex flex-col justify-between h-32">
                <div class="flex justify-between items-start">
                    <span class="text-slate-400 text-sm font-medium uppercase tracking-wider" data-i18n="memory_pool">Memory Pool</span>
                    <i data-lucide="memory-stick" class="text-slate-500 w-5 h-5"></i>
                </div>
                <div class="flex items-baseline space-x-2">
                    <span id="mem-val" class="text-3xl font-mono font-bold text-emerald-400">0%</span>
                    <span id="swap-val" class="text-sm font-mono text-slate-500">Swap: 0MB</span>
                </div>
            </div>

            <!-- Network Bandwidth -->
            <div class="card rounded-lg p-5 flex flex-col justify-between h-32">
                <div class="flex justify-between items-start">
                    <span class="text-slate-400 text-sm font-medium uppercase tracking-wider" data-i18n="network">Network</span>
                    <i data-lucide="activity" class="text-slate-500 w-5 h-5"></i>
                </div>
                <div class="flex flex-col space-y-1 mt-2">
                    <div class="flex items-center justify-between text-xs font-mono">
                        <span class="text-emerald-400 flex items-center"><i data-lucide="arrow-down" class="w-3 h-3 mr-1"></i>Rx</span>
                        <span id="net-rx-val" class="text-emerald-400">0 KB/s</span>
                    </div>
                    <div class="flex items-center justify-between text-xs font-mono">
                        <span class="text-indigo-400 flex items-center"><i data-lucide="arrow-up" class="w-3 h-3 mr-1"></i>Tx</span>
                        <span id="net-tx-val" class="text-indigo-400">0 KB/s</span>
                    </div>
                </div>
            </div>

            <!-- Disk I/O Wait -->
            <div class="card rounded-lg p-5 flex flex-col justify-between h-32 transition-colors duration-500" id="io-card">
                <div class="flex justify-between items-start">
                    <span class="text-slate-400 text-sm font-medium uppercase tracking-wider" data-i18n="io_wait">I/O Wait</span>
                    <i data-lucide="hard-drive" class="text-slate-500 w-5 h-5"></i>
                </div>
                <div class="flex items-baseline space-x-2">
                    <span id="io-val" class="text-3xl font-mono font-bold text-emerald-400 transition-colors duration-500">0%</span>
                </div>
            </div>

            <!-- System Health -->
            <div class="card rounded-lg p-5 flex flex-col justify-between h-32">
                <div class="flex justify-between items-start">
                    <span class="text-slate-400 text-sm font-medium uppercase tracking-wider" data-i18n="system_health">System Health</span>
                    <i data-lucide="activity" class="text-slate-500 w-5 h-5"></i>
                </div>
                <div class="flex items-baseline space-x-2">
                    <span id="health-val" class="text-3xl font-mono font-bold text-emerald-400">100%</span>
                </div>
            </div>
        </div>

        <!-- Main Content Area: Charts & Processes -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">

            <!-- Left: Chart & MergerFS Physical Storage Matrix -->
            <div class="lg:col-span-1 space-y-6 flex flex-col">
                <div class="card rounded-lg p-5 flex-shrink-0 h-48 flex flex-col">
                    <h2 class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-2" data-i18n="correlation">Correlation: RAM vs I/O</h2>
                    <div class="flex-grow relative w-full h-full">
                        <canvas id="historyChart"></canvas>
                    </div>
                </div>
                <div class="card rounded-lg p-5 flex-grow flex flex-col h-48 overflow-y-auto terminal-scroll">
                    <h2 class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-2" data-i18n="storage">Physical Storage Grid</h2>
                    <div id="storage-grid" class="space-y-3">
                        <!-- JS Populated physical drive blades -->
                    </div>
                </div>
            </div>

            <!-- Right: Unified Process Grid -->
            <div class="card rounded-lg p-5 h-100 flex flex-col lg:col-span-2" style="height: 408px;">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-slate-400 text-sm font-medium uppercase tracking-wider" data-i18n="top_processes">Top Processes</h2>
                    <span class="text-xs text-slate-500 bg-slate-800 px-2 py-1 rounded" data-i18n="sorted_by">Sorted by Disk I/O</span>
                </div>
                <div class="flex-grow overflow-y-auto terminal-scroll">
                    <table class="w-full text-left text-sm">
                        <thead class="text-slate-500 border-b border-slate-800/60 font-mono text-xs uppercase">
                            <tr>
                                <th class="pb-2 font-medium" data-i18n="th_name">Name</th>
                                <th class="pb-2 font-medium" data-i18n="th_type">Type</th>
                                <th class="pb-2 font-medium text-right">CPU%</th>
                                <th class="pb-2 font-medium text-right">RAM</th>
                                <th class="pb-2 font-medium text-right" data-i18n="th_disk">Disk I/O</th>
                            </tr>
                        </thead>
                        <tbody id="process-table" class="font-mono text-xs divide-y divide-slate-800/60">
                            <!-- JS Populated -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

        <!-- Full Width Flight Log -->
        <div class="card rounded-lg p-5 flex flex-col relative overflow-hidden" style="height: 250px;">
            <h2 class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-2" data-i18n="flight_log">System Flight Log</h2>
            <div id="log-window" class="flex-grow overflow-y-auto terminal-scroll font-mono text-[10px] space-y-1 text-slate-300 pr-2">
                <!-- JS Populated -->
            </div>
            <!-- Gradient fade at bottom -->
            <div class="absolute bottom-0 left-0 right-0 h-8 bg-gradient-to-t from-[#0f172a] to-transparent pointer-events-none"></div>
        </div>

    </div>

    <script>
        // --- Localization System ---
        const translations = {
            'en': {
                'live_telemetry': 'LIVE SYSTEM TELEMETRY',
                'cpu_load': 'CPU Load',
                'memory_pool': 'Memory Pool',
                'network': 'Network',
                'io_wait': 'I/O Wait',
                'system_health': 'System Health',
                'correlation': 'Correlation: RAM vs I/O',
                'storage': 'Physical Storage Grid',
                'top_processes': 'Top Docker Processes',
                'sorted_by': 'Sorted by Disk I/O',
                'th_name': 'Name',
                'th_type': 'Type',
                'th_disk': 'Disk I/O',
                'flight_log': 'System Flight Log (Guard/Cut)'
            },
            'it': {
                'live_telemetry': 'TELEMETRIA DI SISTEMA LIVE',
                'cpu_load': 'Carico CPU',
                'memory_pool': 'Memoria',
                'network': 'Rete',
                'io_wait': 'Attesa I/O',
                'system_health': 'Salute Sistema',
                'correlation': 'Correlazione: RAM vs I/O',
                'storage': 'Griglia Storage Fisico',
                'top_processes': 'Processi Docker Principali',
                'sorted_by': 'Ordinato per I/O Disco',
                'th_name': 'Nome',
                'th_type': 'Tipo',
                'th_disk': 'I/O Disco',
                'flight_log': 'Log di Volo (Guard/Cut)'
            }
        };

        let currentLang = 'en';

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'it' : 'en';
            document.getElementById('lang-btn').textContent = currentLang === 'en' ? '🇮🇹 IT' : '🇬🇧 EN';
            applyTranslations();
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) {
                    el.textContent = translations[currentLang][key];
                }
            });
        }

        lucide.createIcons();

        // Chart Setup
        const ctx = document.getElementById('historyChart').getContext('2d');
        const historyChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(30).fill(''),
                datasets: [
                    {
                        label: 'RAM Used %',
                        borderColor: '#34d399', // emerald-400
                        backgroundColor: 'rgba(52, 211, 153, 0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.4,
                        data: Array(30).fill(0)
                    },
                    {
                        label: 'I/O Wait %',
                        borderColor: '#fbbf24', // amber-400
                        backgroundColor: 'rgba(251, 191, 36, 0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.4,
                        data: Array(30).fill(0)
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 },
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { display: true, labels: { color: '#94a3b8', font: {family: 'monospace', size: 10} } },
                    tooltip: {
                        backgroundColor: '#0f172a',
                        titleColor: '#e2e8f0',
                        bodyColor: '#cbd5e1',
                        borderColor: 'rgba(30, 41, 59, 0.6)',
                        borderWidth: 1,
                        padding: 10,
                        displayColors: true,
                    }
                },
                scales: {
                    x: { display: false },
                    y: {
                        display: true,
                        min: 0,
                        max: 100,
                        grid: { color: 'rgba(30, 41, 59, 0.6)' },
                        ticks: { color: '#64748b', font: {family: 'monospace', size: 10} }
                    }
                }
            }
        });

        function updateColor(element, value, warningThreshold, criticalThreshold, isHealth=false) {
            element.classList.remove('text-emerald-400', 'text-amber-400', 'text-rose-500');

            let cClass = 'text-emerald-400';
            if (isHealth) {
                if (value < criticalThreshold) cClass = 'text-rose-500';
                else if (value < warningThreshold) cClass = 'text-amber-400';
            } else {
                if (value > criticalThreshold) cClass = 'text-rose-500';
                else if (value > warningThreshold) cClass = 'text-amber-400';
            }
            element.classList.add(cClass);
            return cClass;
        }

        async function fetchMetrics() {
            try {
                const res = await fetch('/api/metrics');
                const data = await res.json();

                // Network
                let rx_val = (data.network.rx_bps / 1024).toFixed(1);
                let tx_val = (data.network.tx_bps / 1024).toFixed(1);
                if (rx_val > 1024) rx_val = (rx_val/1024).toFixed(1) + ' MB/s'; else rx_val += ' KB/s';
                if (tx_val > 1024) tx_val = (tx_val/1024).toFixed(1) + ' MB/s'; else tx_val += ' KB/s';
                document.getElementById('net-rx-val').textContent = rx_val;
                document.getElementById('net-tx-val').textContent = tx_val;

                // Disks
                const storageGrid = document.getElementById('storage-grid');
                storageGrid.innerHTML = '';
                for (const [dev, disk] of Object.entries(data.disks)) {
                    const ringClass = disk.utilization > 80 ? 'ring-2 ring-rose-500 bg-rose-500-10' :
                                     (disk.utilization > 50 ? 'ring-1 ring-amber-500 bg-amber-500-10' : 'border-slate-800/60');

                    const div = document.createElement('div');
                    div.className = `p-3 rounded bg-slate-900 border ${ringClass} transition-all duration-300`;

                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs font-bold font-mono text-slate-300 flex items-center">
                                <i data-lucide="database" class="w-3 h-3 mr-1 text-slate-500"></i>/dev/${dev}
                            </span>
                            <span class="text-xs font-mono ${disk.utilization > 80 ? 'text-rose-500' : 'text-emerald-400'}">${disk.utilization.toFixed(1)}%</span>
                        </div>
                        <div class="flex justify-between items-center text-[10px] font-mono text-slate-500">
                            <span>R: ${(disk.read_bps/1024/1024).toFixed(1)}M/s W: ${(disk.write_bps/1024/1024).toFixed(1)}M/s</span>
                            <span>Q: ${disk.queue_length}</span>
                        </div>
                    `;
                    storageGrid.appendChild(div);
                }
                lucide.createIcons({ root: storageGrid });

                document.getElementById('cpu-val').textContent = data.cpu.load + '%';
                document.getElementById('cpu-temp').textContent = data.cpu.temp + '°C';
                updateColor(document.getElementById('cpu-val'), data.cpu.load, 70, 90);

                document.getElementById('mem-val').textContent = data.memory.used_percent + '%';
                const swapMb = Math.round(data.memory.swap_used_kb / 1024);
                document.getElementById('swap-val').textContent = 'Swap: ' + swapMb + 'MB';
                updateColor(document.getElementById('mem-val'), data.memory.used_percent, 80, 95);

                const ioVal = document.getElementById('io-val');
                ioVal.textContent = data.io_wait + '%';
                const ioClass = updateColor(ioVal, data.io_wait, 5, 15);

                const ioCard = document.getElementById('io-card');
                ioCard.classList.remove('bg-amber-500-10', 'bg-rose-500-10', 'animate-pulse');
                if (data.io_wait > 15) {
                    ioCard.classList.add('bg-rose-500-10', 'animate-pulse');
                } else if (data.io_wait > 5) {
                    ioCard.classList.add('bg-amber-500-10');
                }

                document.getElementById('health-val').textContent = data.health_score + '%';
                updateColor(document.getElementById('health-val'), data.health_score, 80, 50, true);

                // Update Chart
                const ramData = historyChart.data.datasets[0].data;
                const ioData = historyChart.data.datasets[1].data;

                ramData.shift();
                ramData.push(data.memory.used_percent);

                ioData.shift();
                ioData.push(data.io_wait);

                historyChart.update();

            } catch (e) { console.error('Error fetching metrics', e); }
        }

        function parseDiskIo(ioStr) {
            // Very rough parsing for sorting. e.g "1.2MB / 0B" -> return float MB equivalent
            if (!ioStr || ioStr === '-' || ioStr === '0B / 0B') return 0;
            // just look at the first part (read or in)
            let inPart = ioStr.split('/')[0].trim();
            let val = parseFloat(inPart) || 0;
            if (inPart.includes('G')) val *= 1024;
            else if (inPart.includes('B') && !inPart.includes('M') && !inPart.includes('K')) val /= (1024*1024);
            else if (inPart.includes('K')) val /= 1024;
            return val;
        }

        async function fetchProcesses() {
            try {
                const res = await fetch('/api/processes');
                const data = await res.json();

                const tbody = document.getElementById('process-table');
                tbody.innerHTML = '';

                // Sort by Disk IO primarily, then Memory
                let procs = data.processes;
                procs.sort((a, b) => {
                    let ioA = parseDiskIo(a.disk_io);
                    let ioB = parseDiskIo(b.disk_io);
                    if (ioB !== ioA) return ioB - ioA;

                    let memA = a.mem_bytes || (a.mem_percent * 10000) || 0;
                    let memB = b.mem_bytes || (b.mem_percent * 10000) || 0;
                    return memB - memA;
                });

                procs.slice(0, 15).forEach(p => {
                    const tr = document.createElement('tr');
                    tr.className = 'table-row';

                    const nameTd = document.createElement('td');
                    nameTd.className = 'py-2 text-slate-300 truncate max-w-[150px]';
                    nameTd.title = p.name;
                    nameTd.textContent = p.name;

                    const typeTd = document.createElement('td');
                    typeTd.className = 'py-2';
                    const badge = document.createElement('span');
                    badge.className = `px-2 py-0.5 rounded text-[10px] uppercase font-bold tracking-wider ${p.type === 'docker' ? 'badge-docker' : 'badge-systemd'}`;
                    badge.textContent = p.type;
                    typeTd.appendChild(badge);

                    const cpuTd = document.createElement('td');
                    cpuTd.className = 'py-2 text-right';
                    cpuTd.textContent = p.cpu_percent ? p.cpu_percent.toFixed(1) + '%' : '-';

                    const memTd = document.createElement('td');
                    memTd.className = 'py-2 text-right';
                    if (p.mem_bytes) {
                        memTd.textContent = (p.mem_bytes / (1024*1024)).toFixed(1) + ' MB';
                    } else if (p.mem_percent) {
                        memTd.textContent = p.mem_percent.toFixed(1) + ' %';
                    } else {
                        memTd.textContent = '-';
                    }

                    const ioTd = document.createElement('td');
                    ioTd.className = 'py-2 text-right text-slate-400';
                    ioTd.textContent = p.disk_io || '-';

                    tr.appendChild(nameTd);
                    tr.appendChild(typeTd);
                    tr.appendChild(cpuTd);
                    tr.appendChild(memTd);
                    tr.appendChild(ioTd);
                    tbody.appendChild(tr);
                });

            } catch (e) { console.error('Error fetching processes', e); }
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                const data = await res.json();

                const logWindow = document.getElementById('log-window');
                logWindow.innerHTML = '';

                data.logs.forEach(line => {
                    const div = document.createElement('div');
                    // Style interesting lines
                    const lowerLine = line.toLowerCase();
                    if (lowerLine.includes('flush') || lowerLine.includes('restarting') || lowerLine.includes('below') || lowerLine.includes('cut action')) {
                        div.className = 'pl-2 border-l-2 border-rose-500 text-slate-100 py-0.5';
                    } else if (lowerLine.includes('warning') || lowerLine.includes('failed') || lowerLine.includes('guard action')) {
                        div.className = 'pl-2 border-l-2 border-amber-500 text-slate-200 py-0.5';
                    } else {
                        div.className = 'pl-2 border-l-2 border-slate-800 py-0.5';
                    }
                    div.textContent = line;
                    logWindow.appendChild(div);
                });

                // Auto scroll to bottom
                logWindow.scrollTop = logWindow.scrollHeight;

            } catch (e) { console.error('Error fetching logs', e); }
        }

        // Loop
        setInterval(fetchMetrics, 2000);
        setInterval(fetchProcesses, 5000);
        setInterval(fetchLogs, 3000);

        // Initial fetch
        fetchMetrics();
        fetchProcesses();
        fetchLogs();
    </script>
</body>
</html>
